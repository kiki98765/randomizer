<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Random Game App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    justify-content: flex-start; /* oder center für mittig */
    }

    h1 {
        margin-bottom: 30px;
    }

    .button-container {
        margin-bottom: 50px; /* Mehr Abstand nach unten */
    }

    button {
        display: block;
        width: 80%;
        margin: 10px auto;
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background-color: #007aff;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #005ecb;
    }

    #result {
        margin: 40px auto 20px auto; /* mehr Abstand oben, zentriert */
        font-size: 20px;
        font-weight: bold;
        min-height: 60px;
        width: 80%;
        max-width: 400px;
        text-align: center;
    }

    #nextBtn {
        background-color: #34c759;
        width: 40%;       /* halb so breit */
        margin: 0 auto;   /* zentriert */
        display: block;   /* damit margin auto wirkt */
        padding: 12px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>🎲 Random Game App</h1>

<div class="button-container" id="gameButtons"></div>

<div id="result"></div>
<button id="nextBtn" style="display:none;">Nächster Zufallswert</button>

<script src="script.js"></script>
</body>
</html>
